name: CI

on:
  push:
    branches:
      - main
      - master
      - "cursor/**"
  pull_request:
    branches:
      - main
      - master
      - "cursor/**"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm run test:unit

      - name: Validate OpenAPI YAML
        run: node -e "const fs=require('fs'); const yaml=require('yaml'); yaml.parse(fs.readFileSync('docs/openapi.yaml','utf8')); console.log('openapi.yaml OK')"
